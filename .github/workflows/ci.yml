name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake g++ make

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Run unit tests
        run: |
          cd build
          ./test_temporal
          ./test_wal_temporal

      - name: Integration test — server health
        run: |
          cd $(dirname $0)/../.. || true
          cd ~/work/sentineldb/sentineldb 2>/dev/null || cd .
          
          # Start server in background
          ./build/http_server --port 9090 &
          SERVER_PID=$!
          sleep 2

          # Health check
          HEALTH=$(curl -sf http://localhost:9090/health)
          echo "Health: $HEALTH"
          echo "$HEALTH" | grep -q '"status":"ok"' || (echo "FAIL: health check" && kill $SERVER_PID && exit 1)

          # Write a key
          curl -sf -X POST http://localhost:9090/set \
            -H "Content-Type: application/json" \
            -d '{"key":"ci_test","value":"ci_value"}' || (echo "FAIL: set" && kill $SERVER_PID && exit 1)

          # Read it back
          GET=$(curl -sf "http://localhost:9090/get?key=ci_test")
          echo "Get: $GET"
          echo "$GET" | grep -q '"value":"ci_value"' || (echo "FAIL: get" && kill $SERVER_PID && exit 1)

          # Check metrics endpoint responds
          METRICS=$(curl -sf http://localhost:9090/metrics)
          echo "$METRICS" | grep -q 'sentineldb_requests_total' || (echo "FAIL: metrics" && kill $SERVER_PID && exit 1)

          # WAL file must exist with content
          ls -la data/wal.log || (echo "FAIL: WAL file missing" && kill $SERVER_PID && exit 1)
          [ -s data/wal.log ] || (echo "FAIL: WAL file empty" && kill $SERVER_PID && exit 1)

          echo "✅ All integration tests passed"
          kill $SERVER_PID
          wait $SERVER_PID 2>/dev/null || true

      - name: WAL corruption detection test
        run: |
          rm -rf data/
          
          # Start server, write keys, stop
          ./build/http_server --port 9091 &
          SERVER_PID=$!
          sleep 2
          
          curl -sf -X POST http://localhost:9091/set \
            -H "Content-Type: application/json" \
            -d '{"key":"persist_test","value":"survives_restart"}'
          
          sleep 0.5
          kill $SERVER_PID
          wait $SERVER_PID 2>/dev/null || true
          
          # Inject a corrupt record
          echo "SET badkey badval 99999999 CRC:00000000" >> data/wal.log
          
          # Restart — corrupt record should be skipped, valid data restored
          ./build/http_server --port 9091 2>&1 &
          SERVER_PID=$!
          sleep 2
          
          # Valid key must survive restart
          RESULT=$(curl -sf "http://localhost:9091/get?key=persist_test")
          echo "After restart: $RESULT"
          echo "$RESULT" | grep -q '"value":"survives_restart"' || (echo "FAIL: WAL replay" && kill $SERVER_PID && exit 1)
          
          # Corrupt key must NOT exist
          FAKE=$(curl -sf "http://localhost:9091/get?key=badkey")
          echo "Fake key: $FAKE"
          echo "$FAKE" | grep -q '"error"' || (echo "FAIL: corrupt record was loaded" && kill $SERVER_PID && exit 1)
          
          echo "✅ WAL corruption detection test passed"
          kill $SERVER_PID
          wait $SERVER_PID 2>/dev/null || true
